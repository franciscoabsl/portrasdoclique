services:
  postgres:
    image: postgres:16-alpine
    container_name: ptdc_postgres
    environment:
      POSTGRES_DB: portrasdoclique
      POSTGRES_USER: ptdc_user
      POSTGRES_PASSWORD: ptdc_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptdc_user -d portrasdoclique"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ptdc_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ptdc_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ptdc_user
      RABBITMQ_DEFAULT_PASS: ptdc_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
